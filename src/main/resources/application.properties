# Nombre de la aplicación y puerto dinámico para Render
spring.application.name=lazarus-api
server.port=${PORT:8080}

# --- CONFIGURACIÓN DE BASE DE DATOS (POSTGRESQL) ---
# Se requiere obligatoriamente que estas variables existan en Render
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- CONFIGURACIÓN DE JPA / HIBERNATE ---
# Dialecto específico para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Evita problemas comunes con tipos de datos LOB en PostgreSQL
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Estrategia de nombrado para SQL (CamelCase a underscores)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy


# Incluye el mensaje de la excepción
server.error.include-message=always
# Incluye el stacktrace completo
server.error.include-stacktrace=always
# Opcional: incluye los errores de validación (@Valid)
server.error.include-binding-errors=always

springdoc.swagger-ui.path=/docs